<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback form</title>
</head>
<body>
    <form action="/server">
    <h2>Feedback Form</h2>
    <div>
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" placeholder="Write your name">
    </div>
    <br>
    <div>
        <label for="email">Email:</label>
        <input type="text" name="email" id="email" placeholder="write your email">
    </div>
    <br>
    <div>
        <label for="comment">Message:</label>
        <br>
        <textarea name="comment" id="comment"></textarea>
    </div>
    <br>
    <div>
        <label for="rating">Rate us out of 5:</label>
        <br>
        <input type="radio" name="one" id="one">
        <label for="one">1</label>
        <br>
        <input type="radio" name="two" id="two">
        <label for="two">2</label>
        <br>
        <input type="radio" name="three" id="three">
        <label for="three">3</label>
        <br>
        <input type="radio" name="four" id="four">
        <label for="four">4</label>
        <br>
        <input type="radio" name="five" id="five">
        <label for="five">5</label>
    </div>
    <br>
    <button type="submit">Send your message!</button>
    </form>
</body>
</html>
