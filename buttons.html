<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>
</head>
<body>
    <form action="/server">
        <label for="age">I am 18+ </label>
        <input type="checkbox" checked id="age" name="age" >
        <br>
        <button>Submit</button>
    </form>

    <hr>

    <form action="/server">
        <div>
            <input type="radio" name="Fruit" id="apple">
            <label for="apple">Apple</label>

            <input type="radio" name="Fruit" id="mango">
            <label for="mango">Mango</label>

            <input type="radio" name="Fruit" id="pine_apple">
            <label for="pine_apple">Pine Apple</label>
        </div>
    </form>

    <hr>
    <form action="/Server">
        <div>
            choose your subjects:
            <input type="checkbox" name="Subjects" id="math" value="Maths">
            <label for="math">Maths</label>

            <input type="checkbox" name="Subjects" id="Science">
            <label for="Science">Science</label>

            <input type="checkbox" name="Subjects" id="English">
            <label for="English">English</label>

            <input type="checkbox" name="Subjects" id="Physics">
            <label for="Physics">Physics</label>
            <button>Submit</button>
        </div>
    </form>

</body>
</html>
