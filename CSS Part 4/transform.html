<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            margin-top: 100px;
        }

        div{
            width: 200px;
            height: 50px;
            text-align: center;
            background-color: #7aa874;
            border: 2px solid black;
            margin: 10px;
        }

        div:nth-of-type(2n){
            background-color: #f7db6a;
        }

        div:nth-of-type(3n){
            background-color: #ebb02d;
        }

        #one{
            transform: rotate(45deg);
        }

        #two{
            transform: scale(0.5);  /*scalex scaley*/
        }

        #three{
            transform: translatex(100px);
        }

        #four{
            transform: skew(30deg);
        }

        #five{
            transform: rotate(30deg) translate(150px);
        }

        #blur{
            height: 200px;
            width: 50px;
            text-align: center;
            background-color: #7aa874;
            border-style: none;
            margin: 10px auto;
            box-shadow: 2px 2px 10px black;
        }
    </style>
</head>
<body>
    <section>
        <div id="one">1</div>
        <div id="two">2</div>
        <div id="three">3</div>
        <div id="four">4</div>
        <div id="five">5</div>
    </section>
    <div id="blur"></div>
</body>
</html>
