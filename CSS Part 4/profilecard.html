<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width: 200px;
            border: 2px solid black;
            margin: 10px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 4px 8px black;

            transition: 1s;
        }

        .desc{
            padding: 0px 2px 0 2px;
        }
        

        img{
            width: 100%;
            height: 200px;
            border-radius: 5px 5px;
        }

        .card:hover{
            box-shadow: 0px 8px 16px goldenrod;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="Siddhu.jpeg" alt="Siddhu_image">
        <div class="desc">
            <h3>Siddhardh Reddy</h3>
            <p>Software Engineer</p>
        </div>
    </div>

    <div class="card">
        <img src="manoj.JPG" alt="Manoj_image">
        <div class="desc">
            <h3>Manoj</h3>
            <p>Software Engineer</p>
        </div>
    </div>
</body>
</html>
